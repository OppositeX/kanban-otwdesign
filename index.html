<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project tasks — kanban</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #0b0b0d;
  color: #e8e8e6;
  -webkit-font-smoothing: antialiased;
  padding: 20px;
  line-height: 1.4;
}
.app { max-width: 1400px; margin: 0 auto; }
.head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.title { margin: 0; font-size: 22px; font-weight: 500; letter-spacing: -0.2px; }
.meta { font-size: 13px; color: #8a8a85; margin-top: 4px; }
.summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.stat {
  background: #16161a;
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 12px 14px;
}
.stat-label { font-size: 11px; color: #8a8a85; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-value { font-size: 22px; font-weight: 500; }
.banner {
  background: #16161a;
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 16px;
  font-size: 12px;
  color: #9c9c97;
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1.5;
}
.banner-dot { width: 6px; height: 6px; border-radius: 50%; background: #5DCAA5; flex: none; }
.filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.chip {
  font-size: 12px;
  padding: 6px 11px;
  border-radius: 999px;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: #16161a;
  cursor: pointer;
  color: #b5b5b0;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: inherit;
}
.chip:hover { border-color: rgba(255,255,255,0.28); color: #f0f0ee; }
.chip.active { background: #f0f0ee; color: #0b0b0d; border-color: #f0f0ee; }
.chip.active .dot { box-shadow: 0 0 0 2px rgba(0,0,0,0.25); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  align-items: start;
}
.col {
  background: #131316;
  border-radius: 12px;
  padding: 12px;
  min-height: 220px;
  border: 0.5px solid rgba(255,255,255,0.04);
}
.col-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  padding: 0 4px;
}
.col-name { font-size: 13px; font-weight: 500; }
.col-count {
  font-size: 11px;
  color: #8a8a85;
  background: #1f1f24;
  padding: 2px 8px;
  border-radius: 999px;
  border: 0.5px solid rgba(255,255,255,0.06);
}
.card {
  background: #1c1c20;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.06);
  padding: 10px 12px;
  margin-bottom: 8px;
  transition: border-color 0.1s;
}
.card.expanded { border-color: rgba(255,255,255,0.18); }
.card.overridden { border-left: 2px solid rgba(133,183,235,0.5); }
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.card-tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 999px;
  letter-spacing: 0.2px;
}
.card-id {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 10px;
  color: #6f6f6a;
  background: #0f0f12;
  padding: 2px 6px;
  border-radius: 4px;
  border: 0.5px solid rgba(255,255,255,0.06);
  cursor: pointer;
  user-select: all;
  transition: color 0.1s, border-color 0.1s;
}
.card-id:hover { color: #b5b5b0; border-color: rgba(255,255,255,0.18); }
.card-id.copied { color: #5DCAA5; border-color: rgba(93,202,165,0.4); }
.card-title { font-size: 13px; font-weight: 500; line-height: 1.35; margin: 0 0 4px; color: #efefed; cursor: pointer; }
.card-sub { font-size: 12px; color: #9c9c97; line-height: 1.4; margin: 0; cursor: pointer; }
.card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 11px;
  color: #6f6f6a;
  flex-wrap: wrap;
  gap: 6px;
}
.pri { display: inline-flex; align-items: center; gap: 5px; }
.pri-dot { width: 6px; height: 6px; border-radius: 50%; }
.actions { display: flex; gap: 4px; flex-wrap: wrap; }
.act {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  border: 0.5px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #b5b5b0;
  cursor: pointer;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.act:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.22); color: #f0f0ee; }
.act.done:hover { background: rgba(93,202,165,0.12); border-color: rgba(93,202,165,0.4); color: #5DCAA5; }
.act.start:hover { background: rgba(133,183,235,0.12); border-color: rgba(133,183,235,0.4); color: #85B7EB; }
.act.block:hover { background: rgba(226,75,74,0.12); border-color: rgba(226,75,74,0.4); color: #E24B4A; }
.act.note:hover { background: rgba(239,159,39,0.12); border-color: rgba(239,159,39,0.4); color: #EF9F27; }
.act.reset:hover { background: rgba(120,120,120,0.12); border-color: rgba(120,120,120,0.4); color: #b5b5b0; }
.act.archive:hover { background: rgba(120,120,120,0.12); border-color: rgba(120,120,120,0.4); color: #b5b5b0; }
.archive-toggle {
  font-size: 11px;
  padding: 5px 11px;
  border-radius: 6px;
  border: 0.5px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #8a8a85;
  cursor: pointer;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
  margin-left: auto;
}
.archive-toggle:hover { border-color: rgba(255,255,255,0.22); color: #d5d5d0; background: rgba(255,255,255,0.03); }
.archive-toggle.on { color: #b5b5b0; border-color: rgba(255,255,255,0.18); }
.archive-toggle .badge { font-size: 10px; opacity: 0.6; }
.scope {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid rgba(255,255,255,0.07);
}
.scope-label {
  font-size: 10px;
  color: #6f6f6a;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}
.check {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 0;
  cursor: pointer;
  font-size: 12px;
  color: #c5c5c0;
  line-height: 1.4;
}
.check input {
  margin: 2px 0 0;
  flex: none;
  accent-color: #5DCAA5;
  cursor: pointer;
}
.check.checked .check-text {
  text-decoration: line-through;
  color: #6f6f6a;
}
.check-text { flex: 1; }
.scope-empty { font-size: 11px; color: #5a5a55; font-style: italic; }
.scope-progress {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: #8a8a85;
  margin-left: 6px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
.empty { font-size: 12px; color: #5a5a55; text-align: center; padding: 1.5rem 0; font-style: italic; }
.timer {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  border: 0.5px solid rgba(255,255,255,0.06);
}
.timer.live {
  background: rgba(133,183,235,0.08);
  border-color: rgba(133,183,235,0.25);
  color: #85B7EB;
}
.timer.live .pulse {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #85B7EB;
  animation: pulse 1.6s ease-in-out infinite;
}
.timer.shipped {
  background: rgba(93,202,165,0.08);
  border-color: rgba(93,202,165,0.25);
  color: #5DCAA5;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* Quick links — single row with horizontal scroll */
.qlinks-wrap { margin-bottom: 18px; }
.qlinks-h {
  font-size: 11px;
  color: #8a8a85;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.qlinks {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scroll-snap-type: x proximity;
  padding-bottom: 6px;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.18) transparent;
  -webkit-overflow-scrolling: touch;
}
.qlinks::-webkit-scrollbar { height: 6px; }
.qlinks::-webkit-scrollbar-track { background: transparent; }
.qlinks::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }
.qlinks::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.32); }
.qcard {
  flex: 0 0 168px;
  scroll-snap-align: start;
  background: #16161a;
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  transition: border-color 0.1s, transform 0.05s;
}
.qcard:hover { border-color: rgba(255,255,255,0.22); }
.qlogo {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
  color: #fff;
  overflow: hidden;
  flex: none;
}
.qlogo img { width: 100%; height: 100%; object-fit: contain; padding: 6px; box-sizing: border-box; }
.qlogo.bare { background: transparent !important; padding: 0; }
.qlogo.bare img { padding: 0; }
.qname { font-size: 12px; font-weight: 500; color: #efefed; margin-bottom: 8px; line-height: 1.2; }
.qlinks-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
.qlink {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 6px;
  background: #1f1f24;
  border: 0.5px solid rgba(255,255,255,0.08);
  color: #b5b5b0;
  text-decoration: none;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.qlink:hover { background: #2a2a30; color: #f0f0ee; border-color: rgba(255,255,255,0.22); }
.qlink svg { width: 14px; height: 14px; }
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c20;
  border: 0.5px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  color: #e8e8e6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 100;
}
.toast.show { opacity: 1; }
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .summary { grid-template-columns: repeat(2, 1fr); }
  body { padding: 14px; }
  .title { font-size: 19px; }
  .act { font-size: 12px; padding: 5px 10px; }
  .card-id { font-size: 11px; padding: 3px 7px; }
  .qcard { flex: 0 0 150px; }
}
</style>
</head>

<div class="app">

let colOverride     = JSON.parse(localStorage.getItem('kanban_col_override')     || '{}');
let shippedOverride = JSON.parse(localStorage.getItem('kanban_shipped_override') || '{}');
let startedOverride = JSON.parse(localStorage.getItem('kanban_started_override') || '{}');

function persistOverrides() {
  localStorage.setItem('kanban_col_override',     JSON.stringify(colOverride));
  localStorage.setItem('kanban_shipped_override', JSON.stringify(shippedOverride));
  localStorage.setItem('kanban_started_override', JSON.stringify(startedOverride));
}

function effectiveCol(t)     { return colOverride[t.id]     || t.col; }
function effectiveStarted(t) { return startedOverride[t.id] || t.startedAt; }
function effectiveShipped(t) { return shippedOverride[t.id] || t.shippedAt; }
function isOverridden(t) {
  return colOverride[t.id] !== undefined ||
         shippedOverride[t.id] !== undefined ||
         startedOverride[t.id] !== undefined;
