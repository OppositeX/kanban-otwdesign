<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #0b0b0d;
  color: #e8e8e6;
  -webkit-font-smoothing: antialiased;
  padding: 20px;
  line-height: 1.4;
}
.app { max-width: 1400px; margin: 0 auto; }
.head {
  display: flex;
  align-items: flex-end;

}

.summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
.stat { background: #16161a; border: 0.5px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 14px; }
.stat-label { font-size: 11px; color: #8a8a85; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }

.banner { background: #16161a; border: 0.5px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #9c9c97; display: flex; align-items: center; gap: 8px; line-height: 1.5; }

.chip:hover { border-color: rgba(255,255,255,0.28); color: #f0f0ee; }

.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; align-items: start; }

.card { background: #1c1c20; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.06); padding: 10px 12px; margin-bottom: 8px; transition: border-color 0.1s, opacity 0.15s, transform 0.1s; cursor: grab; }
.card:active { cursor: grabbing; }
.card.expanded { border-color: rgba(255,255,255,0.18); }
.card.overridden { border-left: 2px solid rgba(133,183,235,0.5); }

.col.drop-target { background: #1a2030; outline: 1.5px dashed rgba(133,183,235,0.5); outline-offset: -4px; }
.col-toggles { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; padding: 10px 12px; background: #16161a; border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.06); }

.card-title { font-size: 13px; font-weight: 500; line-height: 1.35; margin: 0 0 4px; color: #efefed; cursor: pointer; }
.card-sub { font-size: 12px; color: #9c9c97; line-height: 1.4; margin: 0; cursor: pointer; }
.card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; font-size: 11px; color: #6f6f6a; flex-wrap: wrap; gap: 6px; }
.pri { display: inline-flex; align-items: center; gap: 5px; }
.pri-dot { width: 6px; height: 6px; border-radius: 50%; }
.actions { display: flex; gap: 4px; flex-wrap: wrap; }
.act { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.1); background: transparent; color: #b5b5b0; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 3px; transition: background 0.1s, border-color 0.1s, color 0.1s; }
.act:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.22); color: #f0f0ee; }
.act.done:hover { background: rgba(93,202,165,0.12); border-color: rgba(93,202,165,0.4); color: #5DCAA5; }
.act.start:hover { background: rgba(133,183,235,0.12); border-color: rgba(133,183,235,0.4); color: #85B7EB; }
.act.block:hover { background: rgba(226,75,74,0.12); border-color: rgba(226,75,74,0.4); color: #E24B4A; }
.act.note:hover { background: rgba(239,159,39,0.12); border-color: rgba(239,159,39,0.4); color: #EF9F27; }
.act.reset:hover { background: rgba(120,120,120,0.12); border-color: rgba(120,120,120,0.4); color: #b5b5b0; }
.archive-toggle { font-size: 11px; padding: 5px 11px; border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.1); background: transparent; color: #8a8a85; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; transition: background 0.1s, border-color 0.1s, color 0.1s; margin-left: auto; }

.scope { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid rgba(255,255,255,0.07); }

.timer { display: inline-flex; align-items: center; gap: 4px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.06); }
.timer.live { background: rgba(133,183,235,0.08); border-color: rgba(133,183,235,0.25); color: #85B7EB; }
.timer.live .pulse { width: 5px; height: 5px; border-radius: 50%; background: #85B7EB; animation: pulse 1.6s ease-in-out infinite; }
.timer.shipped { background: rgba(93,202,165,0.08); border-color: rgba(93,202,165,0.25); color: #5DCAA5; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
.qlinks-wrap { margin-bottom: 18px; }
.qlinks-h { font-size: 11px; color: #8a8a85; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.qlinks { display: flex; gap: 10px; overflow-x: auto; scroll-snap-type: x proximity; padding-bottom: 6px; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) transparent; -webkit-overflow-scrolling: touch; }
.qlinks::-webkit-scrollbar { height: 6px; }
.qlinks::-webkit-scrollbar-track { background: transparent; }
.qlinks::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }
.qlinks::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.32); }

.qcard:hover { border-color: rgba(255,255,255,0.22); }
.qlogo { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px; color: #fff; overflow: hidden; flex: none; }
.qlogo img { width: 100%; height: 100%; object-fit: contain; padding: 6px; box-sizing: border-box; }
.qlogo.bare { background: transparent !important; padding: 0; }
.qlogo.bare img { padding: 0; }
.qname { font-size: 12px; font-weight: 500; color: #efefed; margin-bottom: 8px; line-height: 1.2; }
.qlinks-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
.qlink { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 6px; background: #1f1f24; border: 0.5px solid rgba(255,255,255,0.08); color: #b5b5b0; text-decoration: none; transition: background 0.1s, color 0.1s, border-color 0.1s; }
.qlink:hover { background: #2a2a30; color: #f0f0ee; border-color: rgba(255,255,255,0.22); }
.qlink svg { width: 14px; height: 14px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1c1c20; border: 0.5px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #e8e8e6; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 100; }
.toast.show { opacity: 1; }
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .summary { grid-template-columns: repeat(2, 1fr); } body { padding: 14px; } .title { font-size: 19px; } .act { font-size: 12px; padding: 5px 10px; } .card-id { font-size: 11px; padding: 3px 7px; } .qcard { flex: 0 0 150px; } }

<script>
const CLAUDE_URL = 'https://claude.ai/new?q=';

// ─── Cloud sync via Supabase (cross-device, survives localStorage clears) ───
// Setup: create a free Supabase project, run the SQL in db/kanban-schema.sql,
// then paste the project URL + anon public key here. Without these the board
// still works locally (localStorage only) — just no cross-device sync.
const SUPABASE_URL      = 'https://yxaxmqmkfyhsawbdlloo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4YXhtcW1rZnloc2F3YmRsbG9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjQ2OTEsImV4cCI6MjA5NDIwMDY5MX0.lc_FdyLh-sfXDbuhXUm2aEqGdvb8PcxsAjw2Nqhy5gM';
const KV_TABLE = 'kanban_kv';
const KV_KEY_COL = 'col_override', KV_KEY_SHIP = 'shipped_override', KV_KEY_START = 'started_override';
const sbConfigured = SUPABASE_URL && !SUPABASE_URL.includes('YOUR-') && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith('YOUR_');

async function sbGet(key) {
  if (!sbConfigured) return null;
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/' + KV_TABLE + '?key=eq.' + encodeURIComponent(key) + '&select=value', {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY }
    });
    if (!r.ok) return null;
    const rows = await r.json();
    return rows[0] && rows[0].value ? rows[0].value : null;
  } catch (e) { return null; }
}
async function sbUpsert(key, value) {
  if (!sbConfigured) return false;
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/' + KV_TABLE + '?on_conflict=key', {
      method: 'POST',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({ key, value })
    });
    return r.ok;
  } catch (e) { return false; }
}

// LocalStorage stays as a fast cache; Supabase is the canonical source when configured.
let colOverride     = JSON.parse(localStorage.getItem('kanban_col_override')     || '{}');
let shippedOverride = JSON.parse(localStorage.getItem('kanban_shipped_override') || '{}');
let startedOverride = JSON.parse(localStorage.getItem('kanban_started_override') || '{}');
let _sbHealthy = false;

(async function hydrateFromCloud(){
  if (!sbConfigured) { updateCloudBadge('local-only'); return; }
  updateCloudBadge('syncing');
  const [col, ship, start] = await Promise.all([ sbGet(KV_KEY_COL), sbGet(KV_KEY_SHIP), sbGet(KV_KEY_START) ]);
  let changed = false;
  if (col   && typeof col   === 'object') { colOverride     = col;   localStorage.setItem('kanban_col_override',     JSON.stringify(col));   changed = true; }
  if (ship  && typeof ship  === 'object') { shippedOverride = ship;  localStorage.setItem('kanban_shipped_override', JSON.stringify(ship));  changed = true; }
  if (start && typeof start === 'object') { startedOverride = start; localStorage.setItem('kanban_started_override', JSON.stringify(start)); changed = true; }
  _sbHealthy = true;
  updateCloudBadge('synced');
  // If we pulled data, AND the user already had local mutations (the local was non-empty),
  // push the merged local-wins for any keys missing in cloud so we don't lose work.
  await mergeLocalIntoCloudIfNeeded();
  if (changed && typeof renderAll === 'function') renderAll();
  if (changed && typeof render === 'function') render();
})();

async function mergeLocalIntoCloudIfNeeded() {
  // If cloud was empty for a key but local has data, push local up.
  const localCol   = JSON.parse(localStorage.getItem('kanban_col_override')     || '{}');
  const localShip  = JSON.parse(localStorage.getItem('kanban_shipped_override') || '{}');
  const localStart = JSON.parse(localStorage.getItem('kanban_started_override') || '{}');
  if (Object.keys(localCol).length   > Object.keys(colOverride).length)     await sbUpsert(KV_KEY_COL,   localCol);
  if (Object.keys(localShip).length  > Object.keys(shippedOverride).length) await sbUpsert(KV_KEY_SHIP,  localShip);
  if (Object.keys(localStart).length > Object.keys(startedOverride).length) await sbUpsert(KV_KEY_START, localStart);
}

function updateCloudBadge(state) {
  const el = document.getElementById('cloud-badge'); if (!el) return;
  const map = {
    'local-only': { dot:'#8a8a85', txt:'local only — configure Supabase to sync' },
    'syncing':    { dot:'#EF9F27', txt:'syncing…' },
    'synced':     { dot:'#5DCAA5', txt:'cloud synced' },
    'error':      { dot:'#E24B4A', txt:'sync error — using local cache' },
  };
  const m = map[state] || map['local-only'];
  el.innerHTML = '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+m.dot+';margin-right:6px;"></span>'+m.txt;
}

let _saveTimer = null;
function persistOverrides() {
  localStorage.setItem('kanban_col_override',     JSON.stringify(colOverride));
  localStorage.setItem('kanban_shipped_override', JSON.stringify(shippedOverride));
  localStorage.setItem('kanban_started_override', JSON.stringify(startedOverride));
  if (!sbConfigured) return;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    updateCloudBadge('syncing');
    const r = await Promise.all([
      sbUpsert(KV_KEY_COL,   colOverride),
      sbUpsert(KV_KEY_SHIP,  shippedOverride),
      sbUpsert(KV_KEY_START, startedOverride),
    ]);
    updateCloudBadge(r.every(Boolean) ? 'synced' : 'error');
  }, 600);
}
function effectiveCol(t)     { return colOverride[t.id]     || t.col; }
function effectiveStarted(t) { return startedOverride[t.id] || t.startedAt; }
function effectiveShipped(t) { return shippedOverride[t.id] || t.shippedAt; }
function isOverridden(t) { return colOverride[t.id] !== undefined || shippedOverride[t.id] !== undefined || startedOverride[t.id] !== undefined; }

    links: [ { kind: 'github', url: 'https://github.com/OppositeX/voic-platform', label: 'GitHub' }, { kind: 'vercel', url: 'https://dashboard-otwdesign.vercel.app', label: 'Frontend' }, { kind: 'render', url: 'https://api.voic.ai', label: 'API (Render)' } ] },
  licenser: { name: 'Licenser', logo: 'L', logoUrl: 'logos/licenser.webp', color: '#BA7517', bg: '#633806', text: '#FAC775',

  songbyrd: { name: 'Songbyrd', logo: 'S', logoUrl: 'logos/songbyrd.webp', color: '#E8003F', bg: '#5C0019', text: '#F8B5C8',
    links: [ { kind: 'vercel', url: 'https://songbyrd-rho.vercel.app', label: 'Dashboard' }, { kind: 'render', url: 'https://songbyrd-engine.onrender.com', label: 'Engine' }, { kind: 'github', url: 'https://github.com/OppositeX/Songbyrd', label: 'Dashboard repo' }, { kind: 'github', url: 'https://github.com/OppositeX/Songbyrd-Engine', label: 'Engine repo' } ] },

  { id: 'CNV-116', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-09T22:00:00Z', shippedAt: '2026-05-09T22:30:00Z', t: 'Save & Close stays setup-only (3.0.59)', s: 'Removed the auto-persist of Theatre.js active state from Save & Close. Now ONLY setup (settings + animation) is saved; user explicitly invokes Save State in the State Manager when they want state writes.' },

  { id: 'CNV-118', col: 'archive', proj: 'cnvs', pri: 'med', t: 'Physics consolidation reverted (3.0.61)', s: 'User reported regression on /normal-gravity/: the unified `enable_physics` toggle showed unchecked even when v0.5 saved data had per-shape physics enabled. Reverted: 6 per-shape switchers restored, but now grouped under a single `_physics_accordion` so the UI is still tidy. PHP fan-out removed. Full v0.5 data parity restored.' },
  { id: 'CNV-119', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-09T22:00:00Z', shippedAt: '2026-05-09T22:30:00Z', t: 'Camera orbit duplicated Setup+Drive FIX (3.0.59)', s: 'Singleton Camera Settings tab (3.0.52) added orbit toggles, but the Drive tab kept showing them too via Theatre.js prop tree — neither was obviously authoritative, the Drive one didn\'t respond to clicks. Drive tab now filters out orbit/enableOrbit/enablePan/enableZoom/enableRotate/damping at top level so they live ONLY in Setup. Same for Scene fogEnabled/fogType.' },
  { id: 'CNV-120', col: 'wait', proj: 'cnvs', pri: 'high', t: 'Camera regressions vs v0.5 — multi-page', s: 'User flagged regressions on /cameras/, /perspective-camera/, /orthographic-camera/, /css2d/. Live v0.5 versions at gloo.ooo (replace local with ooo). Object far from camera on load + auto-rotate not running + outline post-fx not in panel even though it is in saved state. Feels global rather than per-page.', scope: ['Diff canvasStudioData_* between local v3 and live v0.5 on /cameras/', 'Compare camera section emit (perspective and orthographic split)', 'Verify post_process_effects array round-trips through _resolve_post_process_effects', 'Check if camera_auto_rotate is being read from saved state into runtime orbitControls'] },
  { id: 'CNV-122', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-09T22:55:00Z', shippedAt: '2026-05-09T23:05:00Z', t: 'v0.5 settings merge into panel load (3.0.62)', s: 'load_settings AJAX was returning the v3 row alone when it existed. v0.5 saved post_process_effects, camera_*, fog_*, environment_*, etc. into _elementor_data. Once v3 wrote any settings the panel never saw the v0.5 fields again. Likely root cause of "post-fx exist in saved state but don\'t show in panel". Now: union the v0.5 widget settings under the v3 row — v3 wins, v0.5 fills gaps (missing keys + empty-array v3 keys + empty-string v3 keys).' },
  { id: 'CNV-125', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-09T23:10:00Z', shippedAt: '2026-05-09T23:25:00Z', t: 'Wireframe view-mode being flipped off by enhanceMaterials (3.0.63)', s: 'User report: scene loads wireframed correctly but "monkey code runs and it disappears". Found it: `_enhanceMaterials` rewrites `mat.wireframe = _toBool(def.wireframe)` on EVERY enhanceFromSettings pass — fights both the bundle\'s create-time wireframe AND the view-mode click. The function\'s own header comment said "Bundle handles wireframe". Removed that one line. Wireframe sticks now.' },
  { id: 'CNV-126', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-09T23:15:00Z', shippedAt: '2026-05-09T23:25:00Z', t: 'Environment scene-tree leaf opens its panel (3.0.63)', s: 'Clicking Environment in the scene tree showed nothing in the right panel. Singleton-section lookup keyed only on sheetName — Environment + Renderer + Fog all have sheetName=Scene but represent different schema sections. Now keys on (sheetName, entryName) so Environment → environment_section, Renderer → renderer_section, Scene root → canvas_studio_section.' },
  { id: 'CNV-127', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-09T23:20:00Z', shippedAt: '2026-05-09T23:25:00Z', t: 'Fog Type select + conditional controls (3.0.63)', s: 'Restored v0.5 fog block to the Canvas tab: enable + type select (Linear Fog vs Exponential FogExp2) + color, and per-type conditional controls — Near/Far for linear, Density for exponential. Renderer-side enhanceFromSettings already applies these live (shipped 3.0.50).' },
  { id: 'CNV-128', col: 'done', proj: 'cnvs', pri: 'med', startedAt: '2026-05-09T23:30:00Z', shippedAt: '2026-05-09T23:35:00Z', t: 'Position/Rotation/Scale vec3 removed from Setup (3.0.64)', s: 'These were duplicating the Drive tab\'s Theatre-obj position/rotation/scale prop tree — animatable values belong in Drive. Removed position_v3 / rotation_v3 / scale_v3 from the elements schema. Custom Origin vec3 stays (non-animatable pivot config, lives in Setup).' },
  { id: 'CNV-129', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-09T23:40:00Z', shippedAt: '2026-05-09T23:50:00Z', t: 'Setup/Drive tabs → two side-by-side cards (3.0.65)', s: 'User: previous underlined-text tabs were "almost unnoticeable" despite this being the most important conceptual split. Replaced with a 2-column grid of card-style buttons. Each card has its own accent: Setup = steel blue, Drive = violet (matches keyframe-diamond palette). Active state lights the card with a colored gradient + border + soft glow + 1px inset highlight. Hover lifts 1px. Both cards stay equal width.' },
  { id: 'CNV-130', col: 'archive', proj: 'cnvs', pri: 'high', t: 'Timeline track-aggregate REVERTED (3.0.66)', s: 'I rewrote _loadTracks to aggregate project-wide tracks when no element is selected. User flagged: this is a regression. v0.5 _loadTracks ALSO requires a selection (verified byte-for-byte against cnvs-editor.js.bak). Reverted to v0.5 baseline. The "play head not running" report needs a different angle — likely the user just had nothing selected when they checked. Saved a new memory rule: every CNVS feature must match v0.5 unless explicitly approved.' },
  { id: 'CNV-140', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T23:30:00Z', shippedAt: '2026-05-10T23:45:00Z', t: 'HOTFIX: parse error in main plugin file (3.0.79)', s: 'Second instance of the same latent-truncation bug as CNV-138 — main plugin entry canvas-studio-for-elementor.php was silently truncated at the v3 bootstrap. output_ai_usage_widget() opened an else-branch with <table class="... and the file ended mid-attribute. PHP threw parse error on line 586 — white-screen. OPCache had been masking it; the v3.0.78 admin-bar edits invalidated OPCache and forced re-parse. Restored: rest of recent-runs table loop + endif/divs, missing enqueue_license_admin_assets() and add_plugin_action_links() methods (both referenced in constructor but undefined), class close, plus a cnvs_studio_v3_boot() wrapper on plugins_loaded@5 that instantiates the class. Brace/bracket/paren count now 0/0/0. Commit a6dc269 + tag v3.0.79 pushed to main.', scope: ['Reload site — parse error gone', 'Admin bar CNVS: Studio pill visible (violet)', 'Click → CNVS: GSAP (teal) + reload', 'Alt+\\ to hide studio → scroll-tween fires', 'Audit shortcode.php + canvas-studio.php for same latent truncations'] },
  { id: 'CNV-139', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T22:30:00Z', shippedAt: '2026-05-10T23:00:00Z', t: 'Studio/GSAP mode toggle in admin bar (3.0.78)', s: 'User report: GSAP scroll-tween cannot run while editing in Studio — admin mode hard-coded disableGsap=true. Implemented mode toggle: localStorage.cnvsMode = studio|gsap. WP admin bar gets a pill (CNVS: Studio / CNVS: GSAP), click toggles + reloads. Two-condition gate (Path B as user preferred): GSAP fires only when mode===gsap AND localStorage[cnvs.editor.uiHidden]===1 (Alt+\ hides studio). Visitor behaviour unchanged (animation_settings.global.enabled). PHP touches: canvas-studio-for-elementor.php (admin_bar_menu + footer JS), widget.php enqueue_theatre_scripts disableGsap rewritten as runtime IIFE that reads localStorage, shortcode.php mirrored. Commit cbe0fc5 + tag v3.0.78 pushed to GLOO-ooo/cnvs-studio-v3.', scope: ['Reload homepage and look for CNVS: Studio pill in admin bar', 'Click pill → reloads → label flips to CNVS: GSAP', 'Press Alt+\ to hide studio → scroll-tween should fire', 'Press Alt+\ to restore studio → tween freezes again'] },
  { id: 'CNV-138', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T22:00:00Z', shippedAt: '2026-05-10T22:15:00Z', t: 'HOTFIX: parse error in widget.php (3.0.77)', s: 'WordPress went white-screen with `unexpected end of file, expecting ]` on canvas-studio-elementor-widget.php:2648. Root cause: _post_process_effects_from_cloud_map() was added in the v3.0.72 PHP-layer commit but only the function declaration + first array key got written — the body, the array close, the function close, the class close, and the Plugin::register_widget_type() call were all missing. The file was open-ended PHP that happened to parse fine until somebody parsed the second half. Completed the function (cloud-map → repeater translation), added _infer_effect_type_from_keys (referenced earlier but undefined), closed the class, restored the registration line. Site back up. Pushed main + tag v3.0.77 to GLOO-ooo/cnvs-studio-v3 — same commit also brings remote main up from 7e90687 to current dev state (v3.0.72→76 work in one merge commit on top of the bootstrap).'  },
  { id: 'CNV-137', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T19:30:00Z', shippedAt: '2026-05-10T20:00:00Z', t: 'Phantom-merge UNION + shortcode GSAP parity + transition .catch (3.0.76)', s: 'Three fixes in one bump: (1) v3.0.73 phantom-merge guard was substituting whole repeater arrays — broke bundle init on pages where raw _elementor_data is also partial (Y2.init -> .split() of undefined on geometry-shapes). Rewrote as per-item UNION via _id/unique_id match: keep v3 item shape, fill missing fields from raw, never overwrite an existing v3 value, never replace the array. (2) Shortcode now ships GSAP parity. Removed hardcoded disableGsap=true from enqueue_theatre_scripts() — flag now mirrors the widget ("enabled when animation_settings.global.enabled is true"). Shortcode render() now also calls $widget->generate_animation_code($post_id, $unique_id) so per-transition ScrollTrigger.create modules emit on shortcode-only pages too. generate_animation_code + helpers (get_animation_settings, get_canvas_project_states, find_project_state_by_state_id) flipped to public for cross-class reuse. (3) Animation transition .then() chain now has .catch() that logs the actual error. Was failing silently — bundle init throws -> Theatre project missing -> precomputeChangedObjects errors -> ScrollTrigger.create below the throw never ran -> 3 triggers instead of 5 on homepage with no console diagnostic. Now the error surfaces. Commit 1bf4ab7 + tag v3.0.76. push-everything.ps1 updated.', scope: ['Reload geometry-shapes — confirm Y2.init split error is gone', 'Reload homepage — read the new .catch error to find what was killing transitions 1+2', 'Try shortcode-only test page on a Block Editor post', 'Sprint towards Elementor-free LinkShop fresh site (HUB-303 pairing)'] },
  { id: 'CNV-136', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T19:00:00Z', shippedAt: '2026-05-10T19:30:00Z', t: 'localStorage stale-state guard (3.0.75)', s: 'Final regression layer for the homepage. The bundle reads canvasStudioloadState{pageId} from localStorage to remember the last Theatre.js state across editor sessions, and prefers it over canvasStudioData_*.responsiveStates.desktop. The homepage had this stuck on "00" — a state with the OLD light naming (rect/spot/dir) that no longer matches the current point1/2/3 lights. Even after restoring the rich data and fixing responsive_states, the bundle kept loading "00" → flat scene. Verified: setting localStorage.canvasStudioloadState39070="startnew" + reload → dramatic dark Thinker with both halo rings glowing, matches ooo. Code fix in cnvs-core.js: on cache-bust URLs (?cb...) or when localStorage is one of the known-stale defaults ("00", "01", null, empty), prefer responsiveStates.desktop and write that into localStorage. Editor-driven state switches still flow through localStorage as before. Commit df206b6 + tag v3.0.75.', scope: ['User clears their browser localStorage one time (one-liner in DevTools)', 'Future page loads use the guard, no manual fix needed'] },
  { id: 'CNV-135', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T18:00:00Z', shippedAt: '2026-05-10T18:30:00Z', t: 'Homepage rendering RESTORED from May 2 backup', s: 'Three layers of regression on post 39070, all repaired: (1) v3 post_meta canvas_studio_settings_83b3cb4 had PHANTOM repeater rows — only id-shaped fields per item, all per-material/per-light config stripped — and these were overriding the rich v0.5 _elementor_data via array_merge in widget render. Fixed structurally in 3.0.73 phantom-merge guard. (2) responsive_states was the literal string "yes" instead of the {desktop, tablet, mobile} object the bundle reads to load Theatre.js initial state. Fixed by writing {desktop:"startnew", mobile:"MOBILESTART", tablet:"MOBILESTART"} (matches ooo). (3) The actual rich data WAS gone from local DB for 5+ months including all revisions — recovered from May 2 wpress backup at C:\\Users\\ozomr\\Desktop\\vibe\\cnvs.gloo.ooo\\cnvsstudio-20260502225959-x1zrq.zip. Extracted _elementor_data, canvas_studio_processed_config_general, canvas_studio_states, canvas_studio_animation_settings; URL-rewrote cnvs.gloo.ooo -> cnvs.gloo.local; wrote them back; cleared phantoms. RESULT: post 39070 now renders the dark moody Thinker with proper depth/shadows matching ooo. Halo glow + scroll-driven animations should follow. The diag/restore script is at canvas-studio-v3/_diag-pp.php with backup files in _restore/ (gitignored — per-post + per-backup, not source).', scope: ['Verify halos appear at correct scroll positions', 'Repeat restore for any other phantom-affected posts', 'Phantom-merge guard catches future occurrences in code (v3.0.73)'] },
  { id: 'CNV-134', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T17:00:00Z', shippedAt: '2026-05-10T17:30:00Z', t: 'Homepage responsive_states fixed (3.0.74)', s: 'Found the actual cause of the flat-gray render. canvas_studio_settings_83b3cb4.responsive_states was the literal STRING "yes" — not the {desktop, tablet, mobile} object the bundle expects. ooo has {desktop:"startnew", mobile:"MOBILESTART", tablet:"MOBILESTART"}. Of 12 saved Theatre.js states, 4 (00/01/00m/01m) reference an OLD light naming (rect1/rect2/rect3/spot/dir/spot1/spot2/spot3) that the current lightsList no longer has — current uses point1/point2/point3/amb. Theatre overrides applied to non-existent objects = lights stay at defaults = flat lit scene. Newer states (startnew/midnew/endnew/MOBILESTART/MOBILEEND) all reference point1/2/3 and would render correctly. Fix delivered out-of-band via diag script: wrote responsive_states {desktop:"startnew",mobile:"MOBILESTART",tablet:"MOBILESTART"} into both v3 post_meta and _elementor_data widget settings, plus desktop/tablet/mobile_initial_state scalars, and cleared the cloud cache. Verified script_data.responsiveStates is now the correct object. NOTE: this only affects PUBLIC (non-admin) views. Admin/logged-in views still load whatever state the editor last had active (currently "00", an old config) — so the gray render persists for the admin until they click "startnew" in the panel state dropdown. Last-active-state is editor-internal, not in source.', scope: ['Verify public view loads dramatic lighting (log out + reload)', 'If admin should default to startnew too: surface that decision in panel UX'] },
  { id: 'CNV-133', col: 'wip', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T16:30:00Z', t: 'Homepage materials/lights phantom — data restoration needed', s: 'After bloom fix (3.0.72), user said homepage still broke. Visual diff: ooo (v0.5 plugin) renders dark moody Thinker w/ visible halo glows; local (v3 plugin) renders flat gray Thinker, no halos. Same elementsList/lightsList/materialsList structurally but ooo has 38 material keys (with empty-{id,size,url} placeholder maps) while local has only 6 (color, _id, material_type, shininess, target, unique_id). Diagnosis: post 39070 _elementor_data and v3 post_meta canvas_studio_settings_83b3cb4 BOTH have phantom-only repeater items (4-key skeletons: _id, unique_id, *_type, target). Even ALL post revisions back to 2025-12-22 are phantom-only — the rich data has been wiped from local for 5+ months. ooo renders correctly because its cloud-cached processed_config has the full data from before the wipe; local cleared its cloud cache mid-session and rebuilt from current phantom data. Code-side fix shipped in 3.0.73: phantom-list merge guard generalises the post_process_effects fix to all repeaters (materials_list, lights_list, elements_list, instancer_list, post_process_effects, layers_list) — drops phantom v3 row in favour of substantive _elementor_data when available. This is structural, not data recovery. Data recovery options: (1) restore from a backup; (2) snapshot ooo cloud config and replay onto local; (3) re-enter materials/lights via v3 panel by hand. None automated yet.', scope: ['Pick a recovery path (backup/ooo-snapshot/manual)', 'Restore canvas_studio_settings_83b3cb4 with full materials_list + lights_list', 'Verify visual matches ooo'] },
  { id: 'CNV-132', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T12:00:00Z', shippedAt: '2026-05-10T12:50:00Z', t: 'Homepage bloom regression fixed (3.0.72)', s: 'User: regression on http://cnvs.gloo.local/?cb10ghj — bloom missing vs ooo. Root cause: post_process_effects on this page had only a phantom {_id: f91811d} entry (v0.5→v3 migration left an Elementor repeater placeholder with effect_type/effect_enabled/params all stripped). _resolve_post_process_effects() saw a non-empty array and short-circuited before falling through to legacy/cloud, so bloom never reached script_data.postProcessing. Fix: (1) phantom detector treats any list whose every item is {_id only} as empty so legacy/cloud fallbacks still kick in; (2) widget render now propagates per-effect params (bloom_strength/radius/threshold etc.) into pp_config[type] with a generic <type>_<rest> camelCased fallback for unmapped types and slider-object unwrapping; (3) restored bloom data to canvas_studio_settings_83b3cb4 for post 39070 with default params (1.5/0.4/0.85 — matches ooo). Verified: postProcessing.bloom now has {enabled:true, radius:0.4, strength:1.5, threshold:0.85} matching ooo exactly. Local commit f5f35ad on main + tag v3.0.72; push pending GitHub creds on user machine.' },
  { id: 'CNV-131', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-09T23:55:00Z', shippedAt: '2026-05-10T00:30:00Z', t: 'Monkey-patch sweep done (3.0.67-3.0.68)', s: 'Per user: ripped 1-3, kept 4 sanctioned, 5+drop poll, 8 dropped, camera fixed properly. Concretely: (#9) wireframe race-write at line 1411 removed. (#11) 500ms canvasStudioUnsaved poll removed (defineProperty alone is enough). (#8) sheetAnimationStates Map mutation removed (bundle owns playback persistence; we just call sequence.play). (#1-3) Three.js FileLoader/ImageLoader/TextureLoader prototype overrides removed; replaced with data-side empty-URL stripping that runs at boot + on cnvs:scriptDataUpdated event. (#6-7) Camera swap reworked: OrbitControls now properly recreated via `new OrbitClass(newCam, dom)` with config snapshot/copy (clean instance replace, not property write). cameraController.camera write retained as the sanctioned v3 deviation (bundle has zero runtime camera-type-swap API; v0.5 parity for type change was save+reload). Reference distribution to cameraController/rendererController/sceneController + bundle setCamera() if available. KEPT: #4 LU shim + lock (sanctioned single-pipeline), #5 canvasStudioUnsaved defineProperty (no bundle event), #10 wireframe direct-apply field-keyed write (user-driven only, not a race).' },
  { id: 'CNV-123-update', col: 'archive', proj: 'cnvs', pri: 'high', t: 'Renderer UI duplication — keep editor, drop schema', s: 'User decided: keep the editor right-panel render-surfaces UI (Theatre obj prop tree). My settings-panel render_surfaces repeater is the duplication, even though it had auto-z + drag indicator. CNV-123 stays open scoped to: surface drag-to-reorder + drop z_index field on the Theatre side. The settings-panel render_surfaces repeater stays buried (it\'s in renderer_section which is target=editor, never rendered in settings panel anyway).' },
  { id: 'CNV-123', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T00:35:00Z', shippedAt: '2026-05-10T00:50:00Z', t: 'z-index removed from Drive prop tree on Renderer (3.0.69)', s: 'Drive tab on the Renderer entry now strips zIndex / z_index / zindex / "Z Index" / z-index keys at any depth in the prop tree. Surface stacking is auto-derived from render_surfaces array order (Setup tab). Drive-side drag-to-reorder is still a deferred ask — the prop tree comes from the bundle Theatre obj which we don\'t reorder; the Setup tab repeater already supports drag (3.0.51).' },
  { id: 'CNV-124', col: 'done', proj: 'cnvs', pri: 'high', startedAt: '2026-05-10T00:35:00Z', shippedAt: '2026-05-10T00:50:00Z', t: 'Special Effect → render_surface auto-sync (3.0.69)', s: 'When effect_type changes to fluid/neon/particle/image_particle/trail, panel auto-creates a webgl_effect surface entry tagged `_auto: special-fx` with the matching subtype. effect_type=none removes the auto entry. User-managed surfaces (no `_auto` tag) are never touched. The auto-surface shows up in the renderer layers UI without the user having to add it manually.' },
  { id: 'CNV-123', col: 'wait', proj: 'cnvs', pri: 'high', t: 'Renderer surfaces UI duplication', s: 'User screenshot: editor right panel for Scene → Renderer shows General + CSS2D Settings + CSS3D Settings as Theatre.js obj props (NOT schema-driven). Has a z-index control (regression — auto-z was added to render_surfaces in settings panel only). Not draggable (regression — drag-reorder added to settings repeater only). I added auto-z + drop indicator to ONE render_surfaces UI (settings panel) but the editor exposes a DIFFERENT bundle-driven prop tree that\'s untouched. Duplication.', scope: ['Decide canonical UI: settings panel repeater OR editor Theatre obj — pick one', 'If keeping editor Theatre obj as canonical: filter z_index at the Drive tab and add drag-to-reorder to the prop tree', 'If keeping settings repeater as canonical: hide the renderer entry from the Theatre obj sheet'] },
  { id: 'CNV-124', col: 'wait', proj: 'cnvs', pri: 'high', t: 'Special effects flow on add', s: 'When user adds a special effect: (1) needs to appear immediately in the right panel under a "Special Effects" folder (folder hidden if no effects); (2) needs to appear in the renderer layers UI too. Today neither happens consistently — partly tied to CNV-123 duplication.', scope: ['Add Special Effects folder render path to editor right panel', 'Hide folder when post_process_effects array empty', 'Auto-add render-surface entry for new webgl_effect surfaces'] },

  { id: 'HUB-312', col: 'done', proj: 'hub', pri: 'high', startedAt: '2026-05-11T19:15:00Z', shippedAt: '2026-05-11T19:30:00Z', t: 'AI article worker plugin (HUB-304 first slice)', s: 'Hooks pbn_master_order_received → schedules WP-Cron 5s out → generates an article from intake fields → persists to wp_pbn_articles → advances queued → ai_generating → sites_selected. Provider-agnostic: Anthropic Claude default (claude-sonnet-4-6), OpenAI alternative (gpt-4o-mini), placeholder mode that writes a hand-stubbed Markdown article when no API key is configured (lets you walk the spine end-to-end without burning credits). Settings → PBN AI: provider, model, API key (encrypted AES-256-CBC with a per-site secret), system-prompt override. Cost estimator using public list pricing (claude-sonnet-4-6 $3/$15 per Mtok, gpt-4o-mini $0.15/$0.60, etc.). Recent-articles table in admin. PBN Orders page gains an article preview panel (rendered HTML + Markdown source). Error path: failure leaves the job at ai_generating with the error stored in wp_pbn_articles.error so the operator sees it.', scope: ['Install pbn-master-ai-worker-v0.1.0.zip on hub.d3v.co.il', 'Settings → PBN AI → pick provider + paste API key', 'Place an order with intake form → confirm Hub auto-advances to sites_selected within ~5s', 'Eyeball generated article via the PBN Orders preview panel', 'Tune system prompt for brand voice if needed'] },
  { id: 'HUB-311', col: 'done', proj: 'hub', pri: 'high', startedAt: '2026-05-11T19:00:00Z', shippedAt: '2026-05-11T19:30:00Z', t: 'Phase 2 spine v0.2 — intake form + state machine + callback round-trip', s: 'Closed the round-trip on top of HUB-310. Three new plugins ship in pbn-phase2-bundle-v0.2.0.zip: (1) linkshop-order-intake.php — customer-facing form on every Woo product page (target URL, anchor, keywords, language, length, deadline, custom instructions) → cart → checkout → order meta with _pbn_* keys. (2) linkshop-hub-callback.php — receives signed POST /wp-json/linkshop/v1/hub-callback from Hub, validates HMAC, persists publications + history on the order, fires linkshop_hub_callback action. Renders a Fulfillment block on the order edit screen. (3) pbn-master-jobs.php — companion to pbn-master-orders. Walks jobs through queued → ai_generating → sites_selected → scheduled → dispatched → published → reported → done state machine. v0.1 is manual: Advance and Send to LinkShop buttons in the PBN Orders admin. Future AI / dispatch plugins hook the pbn_master_job_advance action. Bundle has full smoke-test steps in README. Spine end-to-end now: storefront form → Woo → Hub intake → state walk → callback → publications visible on order.', scope: ['Install 5 plugins per README install order', 'Smoke test: 1₪ order → Hub job → manual advance → Send to LinkShop → order shows synthetic publication URLs', 'Decide: AI generation worker (HUB-304) or dispatch glue to existing v2.4 child code (HUB-302) next', 'Plug a customer-email companion plugin onto linkshop_hub_callback when status=published'] },
  { id: 'HUB-310', col: 'done', proj: 'hub', pri: 'high', startedAt: '2026-05-11T18:30:00Z', shippedAt: '2026-05-11T19:00:00Z', t: 'Phase 2 spine shipped — LinkShop → Hub fulfillment intake', s: 'Smallest end-to-end slice of HUB-300 architecture. Two single-file plugins + protocol doc. Hub-side: POST /wp-json/pbn/v2/orders endpoint, HMAC-SHA256 signed, per-sender secrets, idempotent via (sender, nonce), creates wp_pbn_jobs / wp_pbn_senders / wp_pbn_nonces tables on activate, admin UI under PBN Orders for sender + recent-job inspection. LinkShop-side: hooks woocommerce_order_status_completed, signs body, POSTs to Hub, logs request+response on the order (per-order meta box), Settings → Hub Bridge page for endpoint/sender/secret. Bundle in outputs/pbn-phase2/ — three zips: full bundle, hub-only, linkshop-only. Includes README + PROTOCOL-v2.md spec.', scope: ['Install pbn-master-orders-v0.1.0.zip on hub.d3v.co.il', 'Copy generated sender secret from PBN Orders admin', 'Install linkshop-to-hub-bridge-v0.1.0.zip on linkshop.co.il', 'Paste secret into Settings → Hub Bridge', 'Place 1₪ Woo test order + mark completed', 'Confirm job appears in PBN Orders → Recent jobs', 'Wire intake form (target_url / anchor / keywords) via order meta — separate plugin, out of spine scope'] },
  { id: 'HUB-300', col: 'wait', proj: 'hub', pri: 'high', t: 'Phase 2 architecture — LinkShop / Master Hub / Children', s: 'Direction set 2026-05-10. The current Hub plugin becomes the Master Hub layer. New: LinkShop (commerce/storefront, sends fulfillment payloads) + an evolved Child connector. Frontend moves off Elementor → React/Next + headless WP. Treat as normal SaaS orchestration (architecturally equivalent to MainWP, ManageWP, multisite tools, CI/CD). End-to-end flow: customer buys on LinkShop → LinkShop POSTs payload → Master Hub creates job → AI generates + selects sites + schedules → child sites publish → status returns to Hub → Hub aggregates report → LinkShop emails customer. Memory: pbn_hub_phase2.md.', scope: ['Connector protocol — first, gates everything else', 'Queue/job architecture', 'Scheduling engine', 'Child-site sync', 'Fulfillment state tracking', 'Reporting pipeline', 'React/Next frontend transition', 'API-first architecture', 'Auth/security hardening', 'Extensible agent workflow system'] },
  { id: 'HUB-301', col: 'wait', proj: 'hub', pri: 'high', t: 'Connector protocol v2 — Master Hub ↔ Children', s: 'Foundational for Phase 2. Defines the wire protocol between Master Hub and the 108 child sites. Must support: secure auth (per-site tokens), remote publishing, scheduled publishing, status sync, heartbeat/health, remote metadata retrieval, extensibility. Existing PBN Core has /wp-json/pbn/v1/ + shared secret pbn-master-2024-x9k2 — that\'s the baseline; v2 should evolve it not replace it.', scope: ['Spec the v2 protocol — endpoints, auth flow, retry semantics, idempotency keys', 'Per-site secrets to retire the shared secret', 'Schedule-then-confirm vs publish-now flows', 'Heartbeat endpoint', 'Status-sync endpoint with publish URL + publish date + error', 'Idempotent job dispatch with order_id+anchor as key', 'Child plugin update path for the protocol bump'] },
  { id: 'HUB-302', col: 'wait', proj: 'hub', pri: 'high', t: 'Queue / job architecture in Master Hub', s: 'Master Hub becomes a distributed task scheduler. Receives fulfillment requests from LinkShop, persists fulfillment jobs, runs AI generation + site-selection + scheduling, dispatches publish jobs to children, retries on failure, tracks state. Existing Hub UI is request-response synchronous — needs to become async + state-machine driven.', scope: ['Job state machine: queued → ai-generating → site-selected → scheduled → dispatched → published → reported', 'Persistence layer (custom WP table or postmeta-backed)', 'Worker (WP-Cron + Action Scheduler hybrid?)', 'Retry policy + backoff', 'Failure handling + dead-letter visibility', 'Job inspector UI in Hub admin'] },
  { id: 'HUB-303', col: 'wait', proj: 'hub', pri: 'high', t: 'LinkShop — commerce/storefront layer', s: 'New layer. Customer-facing platform: products/packages, checkout/credits, order intake, customer comms, status display, emails. Does NOT fulfill. POSTs the fulfillment payload to Master Hub on order completion. Decision pending: WooCommerce-driven WP install OR Next.js storefront with WP-as-API.', scope: ['Decide: Woo-WP vs Next.js + headless WP', 'Product/package catalog model', 'Credit system + balance', 'Checkout + payment provider', 'Order intake schema (target URL, anchor, keywords, language, length, scheduling, deadline, custom)', 'Fulfillment-payload contract → Master Hub', 'Status webhook from Hub', 'Customer email pipeline', 'Order tracking page'] },
  { id: 'HUB-304', col: 'wait', proj: 'hub', pri: 'med', t: 'AI agent workflow — site selection + content gen', s: 'Master Hub\'s AI layer. Takes a fulfillment request and decides where articles go, when, what gets written, internal-link distribution. Generates: structure, body, titles, metadata, keywords, anchor placements, summaries, final reports. Should know: site categories, language compatibility, authority, topic suitability, publication load, scheduling availability, history, client constraints.', scope: ['Site-selection scoring (category/lang/authority/load/relevance)', 'Generation pipeline (prompt → structure → body → metadata)', 'Anchor placement strategy', 'Quality gate / pre-publish review', 'Generation cost tracking per order', 'Templates per package type'] },
  { id: 'HUB-305', col: 'wait', proj: 'hub', pri: 'med', t: 'Frontend transition off Elementor', s: 'Phase 2 calls for the application/dashboard layer to move to React/Next.js + headless WP. Public marketing pages can stay WP if desired. Dashboard screens to migrate: order tracking, reports, credits, site management, scheduling, fulfillment state, article previews, publication logs, analytics.', scope: ['Pick stack (Next.js app router + shadcn/ui likely matches existing Vercel projects)', 'Set up Next app + auth bridge to WP', 'Migrate dashboard screens one by one', 'Keep WP marketing pages for now', 'Vercel deploy under otwdesign team'] },
  { id: 'HUB-306', col: 'wait', proj: 'hub', pri: 'high', t: 'Reporting pipeline — fulfillment → customer', s: 'Hub aggregates per-order: publication URLs, publish dates, statuses, errors. Generates a structured report. Sends to LinkShop. LinkShop emails the customer. Currently Hub has no aggregated report concept — need to build it.', scope: ['Per-order report schema', 'Aggregator that walks job + child responses', 'Webhook back to LinkShop with the report payload', 'Report rendering on customer dashboard (HUB-305)', 'Email template for the customer notification'] },
  { id: 'HUB-307', col: 'wait', proj: 'hub', pri: 'med', t: 'Auth + security hardening for the connector', s: 'Phase 2 raises the stakes — replace the single shared secret with per-site tokens, add request signing, rotate-on-compromise. Pairs with HUB-301 protocol work.', scope: ['Per-site secret generation flow (Add Site → mint token)', 'HMAC request signing (timestamp + nonce + body)', 'Token rotation endpoint', 'Secret storage in Hub (encrypted)', 'Migration: dual-secret window so existing children keep working during rollout'] },
  { id: 'HUB-200', col: 'wait', proj: 'hub', pri: 'high', t: 'Track B — 108-site bulk install (path pick)', s: 'Sub-agent surfaced 3 paths after measuring real timing (3-5min/site = 5-9hrs). Pick: A marathon / B validated batch + script / C check Upress for native bulk-deploy first.', scope: ['User: pick A / B / C', 'Recommended: C → B → A — 10min check on Upress could save 6+ hours'] },
  { id: 'HUB-201', col: 'wait', proj: 'hub', pri: 'high', t: 'v2.5.0 features — operator\'s call', s: 'Two sub-agents independently declined the work after reviewing scope. Operator picks path forward: (a) write PRs yourself + Claude reviews, (b) different tool/provider builds while Claude helps adjacent infra, (c) park v2.5.0 + stay on v2.4.2.', scope: ['User: pick a / b / c', 'If a: write Favorites + Bulk Actions + Sprint Planner first; PR review available', 'If b: ship via different tool, Claude helps HUB-202/HUB-203/secret rotation in parallel', 'If c: close v2.5.0 thread'] },

  { id: 'CNV-300', col: 'done', proj: 'cnvs', pri: 'med', startedAt: '2026-05-09T20:30:00Z', shippedAt: '2026-05-09T21:15:00Z', t: 'TRELLIS via fal.ai — alternate 3D provider (3.0.57)', s: 'Wired client + backend. Schema: ai_3d_provider select in Settings → AI → 3D Model (Hunyuan default, TRELLIS via fal.ai alt). cnvs-ai-chat.callImageTo3D appends `provider` to the AJAX form. PHP image_to_3d() routes to /ai/hunyuan or /ai/trellis based on the param, error messages dynamically use provider name. Fly.io stays — no decommission. Last step (when ready): cloud router needs /ai/trellis endpoint that calls fal.ai TRELLIS.' },
  { id: 'CNV-200', col: 'done', proj: 'cnvs', pri: 'med', startedAt: '2026-05-09T20:00:00Z', shippedAt: '2026-05-09T21:30:00Z', t: 'Image→3D — both paths coexist (3.0.58)', s: 'User explicitly asked to keep the iframe popup AND have the AI agent path. Both wired now: (1) Settings → AI → 3D Model → ✨ Generate 3D Model opens cs-ai-modal iframe at popup_url, now with ?provider=… query so the popup pre-selects the same engine. (2) AI agent calls image_to_3d tool → canvas_studio_image_to_3d AJAX → /ai/hunyuan or /ai/trellis → sideloaded GLB → add_element. Same backend, two surfaces. Iframe stays, no deprecation.' },
  { id: 'CNV-201', col: 'archive', proj: 'cnvs', pri: 'low', t: 'Theatre Studio removed (Theatre Core stays)', s: 'Theatre Studio (editing UI, no license) was removed in 3.0.18+ and replaced with cnvs-theatre-bridge.js. Theatre Core (Apache 2.0, ~280KB) STAYS — still drives sequences/keyframes for sequencing + scroll. No "full removal" planned.' },
  { id: 'CNV-202', col: 'done', proj: 'cnvs', pri: 'med', startedAt: '2026-05-09T20:30:00Z', shippedAt: '2026-05-09T21:15:00Z', t: 'Map prop conditional visibility (3.0.57)', s: 'New __hasValue__ / __noValue__ sentinels in cnvs-controls applyConditions. Sub-controls now hide when parent map empty: bump_scale ← bump_map, normal_scale_x/y ← normal_map, displacement_scale/bias ← displacement_map, ao_map_intensity ← ao_map. Conditions re-evaluate on media set + media remove.' },
  { id: 'CNV-203', col: 'done', proj: 'cnvs', pri: 'med', startedAt: '2026-05-09T20:30:00Z', shippedAt: '2026-05-09T21:15:00Z', t: '3D model 404 fetch check (3.0.57)', s: 'GLTFLoader now HEAD-probes the URL before loading. 404 / network failure → skip the loader entirely with a clear console line + a CNVSToast surfacing the file name. HEAD-405 servers fall through to a Range-byte-0 GET. Stops the opaque "Failed to load buffer" stack on stale assets like marble_bust_01.gltf.' },
  { id: 'CNV-204', col: 'done', proj: 'cnvs', pri: 'med', startedAt: '2026-05-09T20:30:00Z', shippedAt: '2026-05-09T21:15:00Z', t: 'Settings panel first-open lag (3.0.57)', s: 'Parallelised get_project_states with settings + animation requests. Was serial after both resolved (~600-800ms RTT added on first open). Now all three fire concurrently using instance_id as project_id (matches in 99% of cases). Pre-warm + cache layer from earlier still applies.' },
