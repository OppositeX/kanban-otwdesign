<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project tasks — kanban</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #0b0b0d;
  color: #e8e8e6;
  -webkit-font-smoothing: antialiased;
  padding: 20px;
  line-height: 1.4;
}
.app { max-width: 1400px; margin: 0 auto; }
.head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.title { margin: 0; font-size: 22px; font-weight: 500; letter-spacing: -0.2px; }
.meta { font-size: 13px; color: #8a8a85; margin-top: 4px; }
.summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.stat {
  background: #16161a;
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 12px 14px;
}
.stat-label { font-size: 11px; color: #8a8a85; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-value { font-size: 22px; font-weight: 500; }
.banner {
  background: #16161a;
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 16px;
  font-size: 12px;
  color: #9c9c97;
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1.5;
}
.banner-dot { width: 6px; height: 6px; border-radius: 50%; background: #5DCAA5; flex: none; }
.filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.chip {
  font-size: 12px;
  padding: 6px 11px;
  border-radius: 999px;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: #16161a;
  cursor: pointer;
  color: #b5b5b0;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: inherit;
}
.chip:hover { border-color: rgba(255,255,255,0.28); color: #f0f0ee; }
.chip.active { background: #f0f0ee; color: #0b0b0d; border-color: #f0f0ee; }
.chip.active .dot { box-shadow: 0 0 0 2px rgba(0,0,0,0.25); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  align-items: start;
}
.col {
  background: #131316;
  border-radius: 12px;
  padding: 12px;
  min-height: 220px;
  border: 0.5px solid rgba(255,255,255,0.04);
}
.col-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  padding: 0 4px;
}
.col-name { font-size: 13px; font-weight: 500; }
.col-count {
  font-size: 11px;
  color: #8a8a85;
  background: #1f1f24;
  padding: 2px 8px;
  border-radius: 999px;
  border: 0.5px solid rgba(255,255,255,0.06);
}
.card {
  background: #1c1c20;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.06);
  padding: 10px 12px;
  margin-bottom: 8px;
  transition: border-color 0.1s;
}
.card.expanded { border-color: rgba(255,255,255,0.18); }
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.card-tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 999px;
  letter-spacing: 0.2px;
}
.card-id {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 10px;
  color: #6f6f6a;
  background: #0f0f12;
  padding: 2px 6px;
  border-radius: 4px;
  border: 0.5px solid rgba(255,255,255,0.06);
  cursor: pointer;
  user-select: all;
  transition: color 0.1s, border-color 0.1s;
}
.card-id:hover { color: #b5b5b0; border-color: rgba(255,255,255,0.18); }
.card-id.copied { color: #5DCAA5; border-color: rgba(93,202,165,0.4); }
.card-title { font-size: 13px; font-weight: 500; line-height: 1.35; margin: 0 0 4px; color: #efefed; cursor: pointer; }
.card-sub { font-size: 12px; color: #9c9c97; line-height: 1.4; margin: 0; cursor: pointer; }
.card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 11px;
  color: #6f6f6a;
  flex-wrap: wrap;
  gap: 6px;
}
.pri { display: inline-flex; align-items: center; gap: 5px; }
.pri-dot { width: 6px; height: 6px; border-radius: 50%; }
.actions { display: flex; gap: 4px; flex-wrap: wrap; }
.act {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  border: 0.5px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #b5b5b0;
  cursor: pointer;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.act:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.22); color: #f0f0ee; }
.act.done:hover { background: rgba(93,202,165,0.12); border-color: rgba(93,202,165,0.4); color: #5DCAA5; }
.act.start:hover { background: rgba(133,183,235,0.12); border-color: rgba(133,183,235,0.4); color: #85B7EB; }
.act.block:hover { background: rgba(226,75,74,0.12); border-color: rgba(226,75,74,0.4); color: #E24B4A; }
.act.note:hover { background: rgba(239,159,39,0.12); border-color: rgba(239,159,39,0.4); color: #EF9F27; }
.scope {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid rgba(255,255,255,0.07);
}
.scope-label {
  font-size: 10px;
  color: #6f6f6a;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}
.check {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 0;
  cursor: pointer;
  font-size: 12px;
  color: #c5c5c0;
  line-height: 1.4;
}
.check input {
  margin: 2px 0 0;
  flex: none;
  accent-color: #5DCAA5;
  cursor: pointer;
}
.check.checked .check-text {
  text-decoration: line-through;
  color: #6f6f6a;
}
.check-text { flex: 1; }
.scope-empty { font-size: 11px; color: #5a5a55; font-style: italic; }
.scope-progress {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: #8a8a85;
  margin-left: 6px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
.empty { font-size: 12px; color: #5a5a55; text-align: center; padding: 1.5rem 0; font-style: italic; }
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c20;
  border: 0.5px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  color: #e8e8e6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 100;
}
.toast.show { opacity: 1; }
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .summary { grid-template-columns: repeat(2, 1fr); }
  body { padding: 14px; }
  .title { font-size: 19px; }
  .act { font-size: 12px; padding: 5px 10px; }
  .card-id { font-size: 11px; padding: 3px 7px; }
}
</style>

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(() => fallback());
  } else {
    fallback();
  }
  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
}

function pingClaude(task, action) {
  let msg = '';
  switch (action) {
    case 'done':
      msg = `Mark task ${task.id} ("${task.t}") as done. Move to Done column on the kanban next push.`;
      break;
    case 'start':
      msg = `Start working on task ${task.id} ("${task.t}") right now. Spin up a session and get going.`;
      break;
    case 'block':
      msg = `Task ${task.id} ("${task.t}") is blocked. Help me unblock it — what do you need from me?`;
      break;
    case 'note':
      const note = prompt(`Note for ${task.id}:`, '');
      if (!note) return;
      msg = `Update for task ${task.id} ("${task.t}"): ${note}`;
      break;
    default:
      msg = `Task ${task.id}: ${task.t}`;
  }
  window.open(CLAUDE_URL + encodeURIComponent(msg), '_blank');
}

function renderSummary() {
  const total = tasks.length;
  const done = tasks.filter(t => t.col === 'done').length;
  const wip = tasks.filter(t => t.col === 'wip').length;
  const wait = tasks.filter(t => t.col === 'wait').length;
  document.getElementById('summary').innerHTML = `
    <div class="stat"><span class="stat-label">Total</span><div class="stat-value">${total}</div></div>
    <div class="stat"><span class="stat-label">Shipped</span><div class="stat-value">${done}</div></div>
    <div class="stat"><span class="stat-label">Active</span><div class="stat-value">${wip}</div></div>
    <div class="stat"><span class="stat-label">On you</span><div class="stat-value">${wait}</div></div>
  `;
}

function renderFilters() {
  const counts = {};
  tasks.forEach(t => { counts[t.proj] = (counts[t.proj] || 0) + 1; });
  let html = `<button class="chip ${activeProj === 'all' ? 'active' : ''}" data-proj="all">All <span style="opacity:.7">${tasks.length}</span></button>`;
  Object.keys(projects).forEach(k => {
    const p = projects[k];
    const c = counts[k] || 0;
    html += `<button class="chip ${activeProj === k ? 'active' : ''}" data-proj="${k}"><span class="dot" style="background:${p.color}"></span>${p.name} <span style="opacity:.7">${c}</span></button>`;
  });
  const el = document.getElementById('filters');
  el.innerHTML = html;
  el.querySelectorAll('.chip').forEach(b => {
    b.addEventListener('click', () => {
      activeProj = b.dataset.proj;
      renderFilters();
      renderGrid();
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function scopeProgress(task) {
  if (!task.scope || !task.scope.length) return null;
  const taskChecks = checks[task.id] || {};
  const done = task.scope.filter((_, i) => taskChecks[i]).length;
  return { done, total: task.scope.length };
}

function renderCard(t) {
  const p = projects[t.proj];
  const pri = priorities[t.pri];
  const isExpanded = expanded.has(t.id);
  const prog = scopeProgress(t);
  const progStr = prog ? `<span class="scope-progress">${prog.done}/${prog.total}</span>` : '';

  let scopeHtml = '';
  if (isExpanded) {
    if (t.scope && t.scope.length) {
      const taskChecks = checks[t.id] || {};
      scopeHtml = `<div class="scope">
        <div class="scope-label">Scope</div>
        ${t.scope.map((item, i) => {
          const checked = !!taskChecks[i];
          return `<label class="check ${checked ? 'checked' : ''}" data-task="${t.id}" data-i="${i}">
            <input type="checkbox" ${checked ? 'checked' : ''}>
            <span class="check-text">${escapeHtml(item)}</span>
          </label>`;
        }).join('')}
      </div>`;
    } else {
      scopeHtml = `<div class="scope"><div class="scope-empty">No checklist for this task yet.</div></div>`;
    }
  }

  return `
    <div class="card ${isExpanded ? 'expanded' : ''}" data-task="${t.id}">
      <div class="card-top">
        <span class="card-tag" style="background:${p.bg};color:${p.text}">${p.name}</span>
        <span class="card-id" data-id="${t.id}" title="Click to copy">${t.id}</span>
      </div>
      <p class="card-title" data-toggle="${t.id}">${escapeHtml(t.t)}${progStr}</p>
      <p class="card-sub" data-toggle="${t.id}">${escapeHtml(t.s)}</p>
      ${scopeHtml}
      <div class="card-foot">
        <span class="pri"><span class="pri-dot" style="background:${pri.color}"></span>${pri.label}</span>
        <div class="actions">
          <button class="act done"  data-act="done"  data-task="${t.id}" title="Mark done">✓</button>
          <button class="act start" data-act="start" data-task="${t.id}" title="Start now">▶</button>
          <button class="act block" data-act="block" data-task="${t.id}" title="Blocked — help me">⚠</button>
          <button class="act note"  data-act="note"  data-task="${t.id}" title="Note for Claude">✏</button>
        </div>
      </div>
    </div>
  `;
}

function renderGrid() {
  const filtered = activeProj === 'all' ? tasks : tasks.filter(t => t.proj === activeProj);
  document.getElementById('grid').innerHTML = cols.map(col => {
    const colTasks = filtered.filter(t => t.col === col.id);
    const cards = colTasks.map(renderCard).join('') || '<div class="empty">Nothing here</div>';
    return `
      <div class="col">
        <div class="col-head">
          <span class="col-name" style="color:${col.tone}">${col.name}</span>
          <span class="col-count">${colTasks.length}</span>
        </div>
        ${cards}
      </div>
    `;
  }).join('');

  // Wire up interactions
  document.querySelectorAll('.card-id').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.id;
      copyText(id);
      el.classList.add('copied');
      toast(`Copied ${id}`);
      setTimeout(() => el.classList.remove('copied'), 1200);
    });
  });

  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.toggle;
      if (expanded.has(id)) expanded.delete(id);
      else expanded.add(id);
      renderGrid();
    });
  });

  document.querySelectorAll('.check').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const id = el.dataset.task;
      const i = parseInt(el.dataset.i, 10);
      checks[id] = checks[id] || {};
      checks[id][i] = !checks[id][i];
      persistChecks();
      renderGrid();
    });
  });

  document.querySelectorAll('.act').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.task;
      const act = el.dataset.act;
      const task = tasks.find(t => t.id === id);
      if (task) pingClaude(task, act);
    });
  });
}

renderSummary();
renderFilters();
renderGrid();
</script>
</body>
</html>
